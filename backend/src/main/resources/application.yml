spring:
  application:
    name: employee-management

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:employee_db}
    username: ${DB_USER:employee_user}
    password: ${DB_PASSWORD:employee_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    consumer:
      group-id: employee-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    producer:
      retries: 3

kafka:
  topic:
    employee-events: employee-events

server:
  port: ${SERVER_PORT:8080}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.employee: INFO
    org.springframework.kafka: WARN