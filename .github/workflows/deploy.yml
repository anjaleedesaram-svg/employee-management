name: Build and Deploy

on:
  push:
    branches: [main]       # triggers on every push to main

jobs:

  build-and-push:
    runs-on: ubuntu-latest  # GitHub's cloud server builds this

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: anja18533s/employee-backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: anja18533s/employee-frontend:latest

  deploy:
    needs: build-and-push     # waits for build to finish
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          script: |
            cd /root/employee-management
            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
            docker compose pull
            docker compose up -d
            cd /root/kong/nginx
            docker compose restart nginx

            # start frontend
            docker run -d --name frontend \
            -p 3000:80 \
            --network app-network \
            anja18533s/employee-frontend:latest
