server {
    listen 80;
    server_name appemployee-management.info www.appemployee-management.info;
    return 301 https://$host$request_uri;
}

# # HTTPS server
server {
    listen 443 ssl;

    # # OR company certificate paths
    ssl_certificate     /etc/letsencrypt/live/appemployee-management.info/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appemployee-management.info/privkey.pem;

    # # Strong SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

     location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
